<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Vincent Lagrana | Purple Haze Designer</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: #0a0a1a;
      color: #eef2ff;
      line-height: 1.5;
    }

    :root {
      --purple-vibrant: #8b5cf6;
      --purple-glow: #a855f7;
      --purple-mist: #c084fc;
    }

    .container {
      max-width: 1280px;
      margin: 0 auto;
      padding: 0 2rem;
    }

    .navbar {
      position: sticky;
      top: 0;
      z-index: 100;
      backdrop-filter: blur(16px);
      background: rgba(5, 5, 17, 0.85);
      border-bottom: 1px solid rgba(139, 92, 246, 0.3);
      padding: 1rem 0;
    }

    .nav-flex {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
    }

    .logo a {
      font-size: 1.8rem;
      font-weight: 800;
      background: linear-gradient(135deg, #c084fc, #8b5cf6);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      text-decoration: none;
    }

    .nav-links {
      display: flex;
      gap: 2rem;
      list-style: none;
    }

    .nav-links a {
      text-decoration: none;
      font-weight: 600;
      color: #e0d4ff;
      transition: 0.25s ease;
    }

    .nav-links a:hover {
      color: var(--purple-glow);
    }

    .hero {
      padding: 4rem 0 5rem 0;
      background: radial-gradient(circle at 80% 20%, rgba(76, 29, 149, 0.25), transparent);
      min-height: 100vh;
      display: flex;
      align-items: center;
    }

    .hero-grid {
      display: flex;
      align-items: center;
      gap: 4rem;
      flex-wrap: wrap;
    }

    .hero-content {
      flex: 1.2;
      min-width: 280px;
    }

    .hero-image {
      flex: 0.8;
      min-width: 250px;
      text-align: center;
    }

    .hero-badge {
      color: var(--purple-mist);
      font-weight: 500;
      margin-bottom: 1rem;
    }

    .hero h1 {
      font-size: 3.5rem;
      font-weight: 800;
      line-height: 1.2;
      background: linear-gradient(to right, #ffffff, #c084fc);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      margin-bottom: 1rem;
    }

    .hero p {
      font-size: 1.1rem;
      color: #cdc9e6;
      margin-bottom: 1.5rem;
    }

    .btn-group {
      display: flex;
      gap: 1.2rem;
      flex-wrap: wrap;
    }

    .btn {
      padding: 0.9rem 2rem;
      border-radius: 40px;
      font-weight: 700;
      text-decoration: none;
      transition: all 0.3s ease;
      display: inline-flex;
      align-items: center;
      gap: 0.6rem;
    }

    .btn-primary {
      background: linear-gradient(95deg, #8b5cf6, #a855f7);
      color: white;
      box-shadow: 0 8px 20px rgba(139, 92, 246, 0.4);
    }

    .btn-primary:hover {
      transform: translateY(-3px);
      box-shadow: 0 15px 30px rgba(139, 92, 246, 0.6);
    }

    .btn-outline {
      border: 1.5px solid var(--purple-vibrant);
      color: var(--purple-mist);
      background: transparent;
    }

    .btn-outline:hover {
      background: rgba(139, 92, 246, 0.2);
      color: white;
    }

    .profile-pic {
      width: 100%;
      max-width: 320px;
      border-radius: 40px;
      background: linear-gradient(135deg, #2a1e42, #1a0f2e);
      padding: 8px;
      border: 2px solid rgba(139, 92, 246, 0.5);
      box-shadow: 0 25px 40px -15px rgba(0, 0, 0, 0.5);
      transition: transform 0.3s ease;
    }

    .profile-pic:hover {
      transform: scale(1.02);
      border-color: #a855f7;
    }

    .profile-pic img {
      width: 100%;
      height: auto;
      border-radius: 32px;
      display: block;
    }

    @media (max-width: 800px) {
      .nav-flex {
        flex-direction: column;
        gap: 1rem;
      }
      .hero h1 {
        font-size: 2.5rem;
      }
      .hero-grid {
        flex-direction: column;
        text-align: center;
      }
      .hero-content {
        text-align: center;
      }
      .btn-group {
        justify-content: center;
      }
      .profile-pic {
        max-width: 260px;
        margin: 0 auto;
      }
    }
  </style>
</head>
<body>

<nav class="navbar">
  <div class="container nav-flex">
    <div class="logo">
      <a href="#">VINCENT<span style="color:#a855f7;"> LAGRANA</span></a>
    </div>
    <ul class="nav-links">
      <li><a href="#">BSIT 3 F1</a></li>
    </ul>
  </div>
</nav>

<main>
  <section class="hero">
    <div class="container hero-grid">
      <div class="hero-content">
        <div class="hero-badge"><i class="fas fa-crown"></i> MY WEBSITE BA!</div>
        <h1>I am <span style="color:#c084fc;">VINCENT</span><br>with purple attitude.</h1>
        <p>THIS IS MY REQUIREMENTS SA WEB APP HIHI. Purple vibe, modern design, and full of personality.</p>
        
      </div>

      <!-- RIGHT SIDE: PROFILE PICTURE - GUMA GANA NA! -->
      <div class="hero-image">
        <div class="profile-pic">
          <img src="https://i.imgur.com/G4D74I7.jpg" alt="Vincent Lagrana Profile Picture">
        </div>
      </div>
    </div>
  </section>
</main>

<script>
  document.querySelectorAll('.btn').forEach(btn => {
    btn.addEventListener('click', function(e) {
      e.preventDefault();
      alert("Welcome to my purple world! 🟣");
    });
  });
</script>
</body>
</html>
