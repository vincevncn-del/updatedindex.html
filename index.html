<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Vincent Lagrana | Pink Haze Gallery – Friends & Special</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: #0a0a1a;
      color: #fce7f3;
      line-height: 1.5;
    }

    :root {
      --pink-vibrant: #ec4899;
      --pink-glow: #f472b6;
      --pink-mist: #fbcfe8;
      --pink-deep: #be185d;
      --rose-light: #fda4af;
      --coral-love: #fb7185;
    }

    .container {
      max-width: 1280px;
      margin: 0 auto;
      padding: 0 2rem;
    }

    /* Navbar - pink themed */
    .navbar {
      position: sticky;
      top: 0;
      z-index: 100;
      backdrop-filter: blur(16px);
      background: rgba(10, 5, 15, 0.85);
      border-bottom: 1px solid rgba(236, 72, 153, 0.4);
      padding: 1rem 0;
    }

    .nav-flex {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
    }

    .logo a {
      font-size: 1.8rem;
      font-weight: 800;
      background: linear-gradient(135deg, #fbcfe8, #ec4899);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      text-decoration: none;
    }

    .nav-links {
      display: flex;
      gap: 2rem;
      list-style: none;
    }

    .nav-links a {
      text-decoration: none;
      font-weight: 600;
      color: #fce7f3;
      transition: 0.25s ease;
    }

    .nav-links a:hover {
      color: var(--pink-glow);
    }

    /* Hero Section - pink radial */
    .hero {
      padding: 4rem 0 5rem 0;
      background: radial-gradient(circle at 80% 20%, rgba(190, 24, 93, 0.25), transparent);
      min-height: 100vh;
      display: flex;
      align-items: center;
    }

    .hero-grid {
      display: flex;
      align-items: center;
      gap: 4rem;
      flex-wrap: wrap;
    }

    .hero-content {
      flex: 1.2;
      min-width: 280px;
    }

    .hero-image {
      flex: 0.8;
      min-width: 250px;
      text-align: center;
    }

    .hero-badge {
      color: var(--pink-mist);
      font-weight: 500;
      margin-bottom: 1rem;
    }

    .hero h1 {
      font-size: 3.5rem;
      font-weight: 800;
      line-height: 1.2;
      background: linear-gradient(to right, #ffffff, #f472b6);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      margin-bottom: 1rem;
    }

    .hero p {
      font-size: 1.1rem;
      color: #ffe0f0;
      margin-bottom: 1.5rem;
    }

    .btn-group {
      display: flex;
      gap: 1.2rem;
      flex-wrap: wrap;
    }

    .btn {
      padding: 0.9rem 2rem;
      border-radius: 40px;
      font-weight: 700;
      text-decoration: none;
      transition: all 0.3s ease;
      display: inline-flex;
      align-items: center;
      gap: 0.6rem;
      cursor: pointer;
      border: none;
      font-family: 'Inter', sans-serif;
      font-size: 1rem;
    }

    .btn-primary {
      background: linear-gradient(95deg, #ec4899, #f472b6);
      color: white;
      box-shadow: 0 8px 20px rgba(236, 72, 153, 0.4);
    }

    .btn-primary:hover {
      transform: translateY(-3px);
      box-shadow: 0 15px 30px rgba(236, 72, 153, 0.6);
    }

    .profile-pic {
      width: 100%;
      max-width: 320px;
      border-radius: 40px;
      background: linear-gradient(135deg, #3a1a2e, #2a0f20);
      padding: 8px;
      border: 2px solid rgba(236, 72, 153, 0.6);
      box-shadow: 0 25px 40px -15px rgba(0, 0, 0, 0.5);
      transition: transform 0.3s ease;
    }

    .profile-pic:hover {
      transform: scale(1.02);
      border-color: #f472b6;
    }

    .profile-pic img {
      width: 100%;
      height: auto;
      border-radius: 32px;
      display: block;
    }

    /* GALLERY MODAL - pink dream */
    .gallery-modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(10, 5, 18, 0.96);
      backdrop-filter: blur(12px);
      z-index: 1000;
      justify-content: flex-start;
      align-items: center;
      flex-direction: column;
      opacity: 0;
      transition: opacity 0.25s ease;
      overflow-y: auto;
      padding: 2rem 1rem;
    }

    .gallery-modal.active {
      display: flex;
      opacity: 1;
    }

    .modal-header {
      position: sticky;
      top: 0;
      width: 100%;
      max-width: 1100px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: rgba(20, 8, 22, 0.85);
      backdrop-filter: blur(20px);
      padding: 1rem 2rem;
      border-radius: 60px;
      margin-bottom: 2rem;
      z-index: 1010;
      border: 1px solid rgba(236, 72, 153, 0.5);
    }

    .modal-title {
      font-size: 1.4rem;
      font-weight: 700;
      background: linear-gradient(135deg, #fff, #f472b6);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    .close-modal {
      background: rgba(236, 72, 153, 0.3);
      border: 1px solid var(--pink-vibrant);
      color: white;
      font-size: 1.4rem;
      cursor: pointer;
      width: 42px;
      height: 42px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
    }

    .close-modal:hover {
      background: var(--pink-glow);
      transform: scale(1.05);
    }

    /* category tabs - pink */
    .category-tabs {
      display: flex;
      gap: 1.5rem;
      justify-content: center;
      margin-bottom: 2rem;
      flex-wrap: wrap;
    }

    .cat-btn {
      background: rgba(30, 12, 28, 0.8);
      border: 1px solid var(--pink-vibrant);
      padding: 0.7rem 2rem;
      border-radius: 40px;
      font-weight: 700;
      color: #fce7f3;
      cursor: pointer;
      transition: 0.2s;
      font-size: 1rem;
      backdrop-filter: blur(4px);
    }

    .cat-btn i {
      margin-right: 0.6rem;
    }

    .cat-btn.active {
      background: linear-gradient(135deg, #ec4899, #f472b6);
      color: white;
      border-color: transparent;
      box-shadow: 0 4px 14px rgba(236, 72, 153, 0.6);
    }

    .cat-btn:hover:not(.active) {
      background: rgba(236, 72, 153, 0.3);
      border-color: var(--pink-glow);
    }

    .gallery-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 280px));
      gap: 1.8rem;
      justify-content: center;
      width: 100%;
      max-width: 1200px;
      margin: 0 auto;
      padding: 1rem 0.5rem 2rem;
    }

    .gallery-item {
      background: rgba(30, 12, 28, 0.85);
      border-radius: 24px;
      overflow: hidden;
      border: 1px solid rgba(236, 72, 153, 0.5);
      transition: transform 0.3s ease, box-shadow 0.3s;
      cursor: pointer;
      backdrop-filter: blur(4px);
    }

    .gallery-item:hover {
      transform: translateY(-6px);
      border-color: var(--pink-glow);
      box-shadow: 0 20px 30px -10px rgba(236, 72, 153, 0.5);
    }

    .gallery-item img {
      width: 100%;
      aspect-ratio: 1 / 1;
      object-fit: cover;
      display: block;
      transition: 0.2s;
    }

    .gallery-caption {
      padding: 0.8rem;
      text-align: center;
      font-size: 0.85rem;
      font-weight: 600;
      color: #fbcfe8;
      background: rgba(0, 0, 0, 0.6);
    }

    /* Full preview overlay - pink glow */
    .image-preview-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.94);
      backdrop-filter: blur(20px);
      z-index: 1100;
      display: none;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      gap: 1rem;
    }

    .preview-img {
      max-width: 85vw;
      max-height: 80vh;
      border-radius: 28px;
      border: 3px solid var(--pink-glow);
      box-shadow: 0 0 40px rgba(236, 72, 153, 0.6);
      object-fit: contain;
    }

    .close-preview {
      background: var(--pink-vibrant);
      border: none;
      color: white;
      font-size: 1.2rem;
      cursor: pointer;
      padding: 0.6rem 1.5rem;
      border-radius: 60px;
      margin-top: 1rem;
      font-weight: bold;
      transition: 0.2s;
    }

    .close-preview:hover {
      background: #f472b6;
      transform: scale(1.05);
    }

    @media (max-width: 800px) {
      .nav-flex {
        flex-direction: column;
        gap: 1rem;
      }
      .hero h1 {
        font-size: 2.5rem;
      }
      .hero-grid {
        flex-direction: column;
        text-align: center;
      }
      .hero-content {
        text-align: center;
      }
      .btn-group {
        justify-content: center;
      }
      .profile-pic {
        max-width: 260px;
        margin: 0 auto;
      }
      .gallery-grid {
        grid-template-columns: repeat(auto-fit, minmax(160px, 200px));
        gap: 1rem;
      }
      .modal-header {
        padding: 0.8rem 1.2rem;
      }
      .modal-title {
        font-size: 1rem;
      }
      .cat-btn {
        padding: 0.4rem 1.2rem;
        font-size: 0.8rem;
      }
    }
  </style>
</head>
<body>

<nav class="navbar">
  <div class="container nav-flex">
    <div class="logo">
      <a href="#">VINCENT<span style="color:#f472b6;"> LAGRANA</span></a>
    </div>
    <ul class="nav-links">
      <li><a href="#">BSIT 3 F1</a></li>
    </ul>
  </div>
</nav>

<main>
  <section class="hero">
    <div class="container hero-grid">
      <div class="hero-content">
        <div class="hero-badge"><i class="fas fa-heart" style="color:#f472b6;"></i> MY WEBSITE BA!</div>
        <h1>I am <span style="color:#f472b6;">VINCENT</span><br>with pink attitude.</h1>
        <p>THIS IS MY REQUIREMENTS SA WEB APP HIHI. Pink Vibe — soft, sweet, and full of personality.</p>
        <div class="btn-group">
          <!-- PHOTOS BUTTON with categories: Friends & "Sya" -->
          <button class="btn btn-primary" id="openGalleryBtn">
            <i class="fas fa-images"></i> PHOTOS
          </button>
        </div>
      </div>

      <!-- RIGHT SIDE: PROFILE PICTURE - GOOGLE DRIVE -->
      <div class="hero-image">
        <div class="profile-pic">
          <img src="https://drive.google.com/thumbnail?id=12Kl8e3iRei8v9ZcTK3Vy1eyCUa06mWUD&sz=w1000" alt="Vincent Lagrana Profile Picture">
        </div>
      </div>
    </div>
  </section>
</main>

<!-- GALLERY MODAL (with FRIENDS & SYA categories) - PINK THEME -->
<div id="galleryModal" class="gallery-modal">
  <div class="modal-header">
    <div class="modal-title"><i class="fas fa-camera-retro"></i> 📸 VINCENT'S PINK MOMENTS</div>
    <div class="close-modal" id="closeModalBtn"><i class="fas fa-times"></i></div>
  </div>
  
  <!-- Category Tabs: Friends | Sya (special person) -->
  <div class="category-tabs">
    <button class="cat-btn active" data-cat="friends"><i class="fas fa-users"></i> FRIENDS</button>
    <button class="cat-btn" data-cat="sya"><i class="fas fa-heart"></i> SYA</button>
  </div>
  
  <div id="galleryGrid" class="gallery-grid">
    <!-- Dynamic content based on category -->
  </div>
</div>

<!-- Full size preview overlay -->
<div id="previewOverlay" class="image-preview-overlay">
  <img id="previewImg" class="preview-img" alt="Full size preview">
  <button id="closePreviewBtn" class="close-preview"><i class="fas fa-times-circle"></i> Close</button>
</div>

<script>
  // ============================================
  // PHOTO COLLECTION - USING GOOGLE DRIVE IMAGES
  // Now with pink-themed captions
  // ============================================
  
  const photosData = [
    // FRIENDS category (4 na larawan)
    {
      url: "https://drive.google.com/thumbnail?id=128CL8X66yo4HIplehPXKQXexvE9oEMV_&sz=w1000",
      title: "Friendship glow 🩷",
      category: "friends"
    },
    {
      url: "https://drive.google.com/thumbnail?id=131qKe3oJNhnOx4IcAOW_lNG0_ksAWkmu&sz=w1000",
      title: "Squad forever",
      category: "friends"
    },
    {
      url: "https://drive.google.com/thumbnail?id=1H1TEAfijX4PQU3-a3hD_XklleJ0Ax1Ba&sz=w1000",
      title: "Pink memories",
      category: "friends"
    },
    {
      url: "https://drive.google.com/thumbnail?id=1Nifclc2s3AtAF7F_OJszwDs5P27TJiV5&sz=w1000",
      title: "Besties always",
      category: "friends"
    },
    
    // SYA category (special someone - 2 na larawan)
    {
      url: "https://drive.google.com/thumbnail?id=1biYNrkj0vySNIgHbRBug82s53iTFg_Pw&sz=w1000",
      title: "You & me 🩷",
      category: "sya"
    },
    {
      url: "https://drive.google.com/thumbnail?id=13h8Jjk9L2TKNZD21ow3qZNTjZ3fLe8Ct&sz=w1000",
      title: "Sweetest chapter",
      category: "sya"
    }
  ];

  // DOM elements
  const galleryModal = document.getElementById('galleryModal');
  const openGalleryBtn = document.getElementById('openGalleryBtn');
  const closeModalBtn = document.getElementById('closeModalBtn');
  const galleryGrid = document.getElementById('galleryGrid');
  const categoryBtns = document.querySelectorAll('.cat-btn');
  const previewOverlay = document.getElementById('previewOverlay');
  const previewImg = document.getElementById('previewImg');
  const closePreviewBtn = document.getElementById('closePreviewBtn');
  
  let currentCategory = 'friends';

  // Function to render photos based on selected category
  function renderGallery(category) {
    const filtered = photosData.filter(photo => photo.category === category);
    galleryGrid.innerHTML = '';
    
    if (filtered.length === 0) {
      galleryGrid.innerHTML = `<div style="grid-column:1/-1; text-align:center; padding:2rem; color:var(--pink-mist);"><i class="fas fa-camera-slash"></i> No photos in this category yet, but more pink memories coming!</div>`;
      return;
    }
    
    filtered.forEach((photo, idx) => {
      const galleryItem = document.createElement('div');
      galleryItem.classList.add('gallery-item');
      galleryItem.setAttribute('data-cat', category);
      
      const img = document.createElement('img');
      img.src = photo.url;
      img.alt = photo.title;
      img.loading = 'lazy';
      
      const captionSpan = document.createElement('div');
      captionSpan.classList.add('gallery-caption');
      // Pink-themed icons based on category
      if (category === 'sya') {
        captionSpan.innerHTML = `<i class="fas fa-heart" style="color:#f472b6;"></i> ${photo.title}`;
      } else {
        captionSpan.innerHTML = `<i class="fas fa-user-friends" style="color:#fbcfe8;"></i> ${photo.title}`;
      }
      
      galleryItem.appendChild(img);
      galleryItem.appendChild(captionSpan);
      
      // Click to open full preview
      galleryItem.addEventListener('click', (e) => {
        e.stopPropagation();
        openFullPreview(photo.url, photo.title);
      });
      
      galleryGrid.appendChild(galleryItem);
    });
  }
  
  // Open full preview modal
  function openFullPreview(imgUrl, title) {
    previewImg.src = imgUrl;
    previewImg.alt = title || "Vincent's pink memory";
    previewOverlay.style.display = 'flex';
    document.body.style.overflow = 'hidden';
  }
  
  function closeFullPreview() {
    previewOverlay.style.display = 'none';
    document.body.style.overflow = '';
  }
  
  // Open gallery modal
  function openGallery() {
    renderGallery(currentCategory);
    galleryModal.classList.add('active');
    document.body.style.overflow = 'hidden';
  }
  
  function closeGallery() {
    galleryModal.classList.remove('active');
    document.body.style.overflow = '';
  }
  
  // Category switching logic
  function setActiveCategory(category) {
    currentCategory = category;
    // update button active style
    categoryBtns.forEach(btn => {
      const btnCat = btn.getAttribute('data-cat');
      if (btnCat === category) {
        btn.classList.add('active');
      } else {
        btn.classList.remove('active');
      }
    });
    renderGallery(category);
  }
  
  // Event listeners
  openGalleryBtn.addEventListener('click', (e) => {
    e.preventDefault();
    openGallery();
  });
  
  closeModalBtn.addEventListener('click', () => {
    closeGallery();
  });
  
  // Click outside modal content to close (on backdrop)
  galleryModal.addEventListener('click', (e) => {
    if (e.target === galleryModal) {
      closeGallery();
    }
  });
  
  // Category tab listeners
  categoryBtns.forEach(btn => {
    btn.addEventListener('click', () => {
      const category = btn.getAttribute('data-cat');
      if (category === 'friends' || category === 'sya') {
        setActiveCategory(category);
      }
    });
  });
  
  // Preview overlay close events
  closePreviewBtn.addEventListener('click', closeFullPreview);
  previewOverlay.addEventListener('click', (e) => {
    if (e.target === previewOverlay) {
      closeFullPreview();
    }
  });
  
  // ESC key closes both modal and preview
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') {
      if (galleryModal.classList.contains('active')) {
        closeGallery();
      }
      if (previewOverlay.style.display === 'flex') {
        closeFullPreview();
      }
    }
  });
  
  // Initial render
  renderGallery('friends');
  
  console.log("🩷 Pink gallery ready with Vincent's personal photos from Google Drive!");
</script>
</body>
</html>
